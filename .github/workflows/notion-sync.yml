name: Sync Repository Files to Notion

on:
  push:
    branches:
      - "feature/thai/test-flow-2"

jobs:
  sync-to-notion:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Lấy mã nguồn từ repo về máy ảo của GitHub Actions
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Lấy ít nhất 2 commit gần nhất để so sánh sự thay đổi

      # Bước 2: Cài đặt môi trường Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Bước 3: Cài đặt thư viện SDK chính thức của Notion
      - name: Install Dependencies
        run: npm install @notionhq/client

      # Bước 4: Chạy script xử lý đồng bộ dữ liệu
      - name: Run Sync Script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: node .github/scripts/sync.js