name: Build and deploy JAR app to Azure Web App - seal-hackathon-system-backend-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Tránh 2 lần deploy chồng lên nhau khi push nhiều commit liên tiếp
concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Build with Maven
        run: mvn -f backend/seal-hackathon-system/pom.xml clean package -DskipTests

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: 'backend/seal-hackathon-system/target/*.jar'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: $ secrets.AZUREAPPSERVICE_CLIENTID_XXX         # giữ tên secret cũ của bạn
          tenant-id: $ secrets.AZUREAPPSERVICE_TENANTID_XXX         # giữ tên secret cũ của bạn
          subscription-id: $ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_XXX   # giữ tên secret cũ của bạn

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'seal-hackathon-system-backend-api'
          slot-name: 'Production'
          package: '*.jar'