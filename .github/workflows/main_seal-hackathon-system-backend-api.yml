# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy JAR app to Azure Web App - seal-hackathon-system-backend-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Build with Maven
        run: mvn -f backend/seal-hackathon-system/pom.xml clean install

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: '${{ github.workspace }}/backend/seal-hackathon-system/target/*.jar'

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
      
      - name: List files in the current directory
        run: Get-ChildItem -Recurse  # chạy trên windows-latest

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_99A06487DB554B06B938AC17F27D0EBE }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7E530C6D438241C2A2D928A259C1F4F8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B3D3E0852E8D482194F509685162465F }}

      - name: Optimize App Service for Deployment
        # cấu hình Azure App Service để giới hạn lưu trữ Kudu cache.
        # SCM_MAX_ZIP_PACKAGE_COUNT=1 giúp tự động xóa các file ZIP deploy cũ, tránh lỗi đầy bộ nhớ (ZIP Deploy failed).
        run: |
          $RG = az webapp list --query "[?name=='seal-hackathon-system-backend-api'].resourceGroup" -o tsv
          if ($RG) {
            az webapp config appsettings set -g $RG -n seal-hackathon-system-backend-api --settings SCM_MAX_ZIP_PACKAGE_COUNT=1
          } else {
          }

      - name: Stop App Service (Prevent File Lock)
        # Dừng app trước khi deploy để hệ điều hành Windows nhả file .jar ra, tránh lỗi "Deployment Failed" ngay lập tức do không ghi đè được file đang chạy.
        run: |
          $RG = az webapp list --query "[?name=='seal-hackathon-system-backend-api'].resourceGroup" -o tsv
          if ($RG) { az webapp stop -g $RG -n seal-hackathon-system-backend-api }

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'seal-hackathon-system-backend-api'
          slot-name: 'Production'
          # Chỉ định tải lên đích danh file *.jar thay vì "." (cả thư mục hiện tại)
          # Giúp OneDeploy trên Azure nhận diện đây là file Java chạy trực tiếp
          package: '*.jar'

      - name: Start App Service
        # Bật lại app sau khi deploy xong (chạy luôn kể cả khi deploy lỗi hoặc thành công)
        if: always()
        run: |
          $RG = az webapp list --query "[?name=='seal-hackathon-system-backend-api'].resourceGroup" -o tsv
          if ($RG) { az webapp start -g $RG -n seal-hackathon-system-backend-api }

      - name: Print deployment logs on failure
        # chỉ chạy khi quá trình deploy (bước trên) thất bại.
        # lấy chi tiết log lỗi thực sự từ hệ thống của Azure để dễ dàng debug.
        if: failure()
        run: |
          $RG = az webapp list --query "[?name=='seal-hackathon-system-backend-api'].resourceGroup" -o tsv
          if ($RG) {
            az webapp log deployment show -n seal-hackathon-system-backend-api -g $RG
          }
          